[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[context.develop]
  command = "npm run build"

[context.branch-deploy]
  command = "npm run build"

# Retired duplicate: the short "Joint Heirs" blog now points at the full
# Five Titles chapter, so inbound links and search results keep resolving.
[[redirects]]
  from = "/blog/joint-heirs-thrones-inheritance"
  to = "/blog/joint-heirs-with-the-king"
  status = 301

# Retired duplicate: "The Image of Yahuah" was a strict subset of the Bearer
# chapter, which now anchors the-second-adam cluster. Point inbound links and
# search results at the full chapter.
[[redirects]]
  from = "/blog/the-image-of-yahuah"
  to = "/blog/the-bearer-2-unseen-and-image"
  status = 301

# Trinity Studies category retired: the trinity-examined association cluster now
# does the grouping. The listing page is gone; send it to the anchor study.
[[redirects]]
  from = "/trinity/studies"
  to = "/blog/the-throne-and-the-right-hand"
  status = 301

# The Lie of Gravity moved from a /sun-worship/the-priesthood article page to a
# taggable blog post so it can join the cosmology-north cluster.
[[redirects]]
  from = "/sun-worship/the-priesthood/gravity"
  to = "/blog/the-lie-of-gravity"
  status = 301
